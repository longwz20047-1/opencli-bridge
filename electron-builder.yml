appId: com.agentstudio.opencli-bridge
productName: OpenCLI Bridge
directories:
  output: release
  buildResources: assets

files:
  - dist/**/*
  - assets/**/*
  - package.json

# @jackwener/opencli contains CLI scripts that need to run outside asar
asar: true
asarUnpack:
  - node_modules/@jackwener/opencli/**

# Register obk:// protocol for browser-based pairing
protocols:
  - name: OpenCLI Bridge
    schemes: [obk]

# electron-builder auto-generates .ico/.icns from icon.png if platform-specific icons are missing
win:
  target:
    - target: nsis
      arch: [x64]

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  category: public.app-category.developer-tools

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
  category: Development

nsis:
  oneClick: true
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: false
  createStartMenuShortcut: true

publish:
  provider: github
  owner: git-men
  repo: opencli-bridge
  releaseType: release
